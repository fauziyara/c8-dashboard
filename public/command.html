<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C8 Kardi — Command Center</title>
  <link rel="icon" href="/logo.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #070a12; color: #e2e8f0; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .gradient-text { background: linear-gradient(135deg, #00e5a0, #00a3ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>
<body>
  <header class="border-b border-white/5 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="/logo.jpg" alt="C8 Kardi" class="w-10 h-10 rounded-xl object-cover shadow-lg">
        <div>
          <h1 class="text-lg font-bold gradient-text">Command Center</h1>
          <p class="text-[10px] text-slate-500">VPS Status Monitor</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="sseStatus" class="flex items-center gap-2 text-xs">
          <span class="w-2 h-2 rounded-full bg-yellow-400 pulse-dot"></span>
          <span class="text-slate-400">Connecting...</span>
        </div>
        <a href="/" class="glass rounded-lg px-4 py-2 text-xs text-slate-300 hover:text-white transition-all">← Dashboard</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="vpsGrid" class="grid gap-4 md:grid-cols-2">
      <div class="glass rounded-2xl p-8 text-center text-slate-500 col-span-2">
        <span class="text-4xl block mb-3">📡</span>
        Waiting for VPS data...
      </div>
    </div>
  </main>

  <script>
    let allData = {};
    let sse = null;

    function connect() {
      if (sse) sse.close();
      sse = new EventSource('/api/stream');
      sse.addEventListener('init', (e) => {
        const d = JSON.parse(e.data);
        allData = d.data || {};
        render();
        setSSEStatus(true);
      });
      sse.addEventListener('update', (e) => {
        const d = JSON.parse(e.data);
        if (d.vps_id && d.data) { allData[d.vps_id] = d.data; render(); }
        setSSEStatus(true);
      });
      sse.onerror = () => { setSSEStatus(false); sse.close(); setTimeout(connect, 3000); };
    }

    function setSSEStatus(ok) {
      document.getElementById('sseStatus').innerHTML = ok
        ? '<span class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></span><span class="text-slate-400">Live</span>'
        : '<span class="w-2 h-2 rounded-full bg-red-400 pulse-dot"></span><span class="text-slate-400">Reconnecting...</span>';
    }

    function render() {
      const grid = document.getElementById('vpsGrid');
      const entries = Object.entries(allData);
      if (entries.length === 0) {
        grid.innerHTML = '<div class="glass rounded-2xl p-8 text-center text-slate-500 col-span-2"><span class="text-4xl block mb-3">📡</span>Waiting for VPS data...</div>';
        return;
      }

      grid.innerHTML = entries.map(([vpsId, d]) => {
        const s = d.summary || {};
        const wallets = d.wallets || [];
        const ts = d.timestamp ? new Date(d.timestamp) : null;
        const age = ts ? Math.floor((Date.now() - ts.getTime()) / 1000) : 999;
        const statusClass = age < 120 ? 'text-emerald-400' : age < 300 ? 'text-amber-400' : 'text-red-400';
        const statusText = age < 120 ? 'Online' : age < 300 ? 'Stale' : 'Offline';
        const statusEmoji = age < 120 ? '🟢' : age < 300 ? '🟡' : '🔴';
        const ago = age < 60 ? `${age}s ago` : age < 3600 ? `${Math.floor(age/60)}m ago` : `${Math.floor(age/3600)}h ago`;
        const okWallets = wallets.filter(w => !w.error).length;
        const errWallets = wallets.filter(w => w.error).length;

        return `<div class="glass rounded-2xl p-5 hover:border-teal-500/20 transition-all">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <span class="text-lg">${statusEmoji}</span>
              <div>
                <h3 class="font-bold text-white text-sm">${esc(vpsId)}</h3>
                <p class="text-[10px] text-slate-500">${ago}</p>
              </div>
            </div>
            <span class="mono text-xs ${statusClass}">${statusText}</span>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-white/[0.02] rounded-lg p-3">
              <div class="text-[10px] text-slate-500 mb-1">Wallets</div>
              <div class="mono text-lg font-bold text-white">${s.total || wallets.length}</div>
            </div>
            <div class="bg-white/[0.02] rounded-lg p-3">
              <div class="text-[10px] text-slate-500 mb-1">Status</div>
              <div class="mono text-lg">
                <span class="text-emerald-400">${okWallets}</span>
                ${errWallets > 0 ? `<span class="text-slate-500"> / </span><span class="text-red-400">${errWallets}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="space-y-2 text-xs">
            <div class="flex justify-between"><span class="text-slate-400">⏳ Unclaimed</span><span class="mono text-teal-400">${fmt(s.unclaimed)} CC</span></div>
            <div class="flex justify-between"><span class="text-slate-400">✅ Claimed</span><span class="mono text-blue-400">${fmt(s.claimed)} CC</span></div>
            <div class="flex justify-between"><span class="text-slate-400">🔄 rCC</span><span class="mono text-amber-400">${fmt(s.rCC)}</span></div>
            <div class="flex justify-between border-t border-white/5 pt-2"><span class="text-slate-400">💼 Portfolio</span><span class="mono text-purple-400 font-bold">${fmt(s.portfolio)} CC</span></div>
          </div>
        </div>`;
      }).join('');
    }

    function fmt(n) { if (!n || isNaN(n)) return '0'; if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K'; return Number(n).toFixed(2); }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    connect();
    fetch('/api/data').then(r => r.json()).then(d => { if (d.data) { allData = d.data; render(); } }).catch(() => {});
  </script>
</body>
</html>
